{# Footer — semantic HTML5, WCAG 2.1 AA #}
<footer class="site-footer" role="contentinfo">
  <div class="site-footer__inner">
    <p class="site-footer__copyright">
      &copy; {{ copyright_year }}
      <a href="{{ home_url }}me/">{{ copyright_author }}</a>
    </p>

    {# Social links — always visible (single location for social) #}
    <div class="site-footer__social">
      {% include "components/icon-links.html" %}
    </div>

    <p class="site-footer__powered">
      {{ t("built_with",
           sphinx='<a href="https://www.sphinx-doc.org/">Sphinx</a>',
           ablog='<a href="https://ablog.readthedocs.io/">ABlog</a>') | safe }}
    </p>
  </div>
</footer>
