{# Language switcher — compact language code badge derived from lang_alt_code #}
{% if lang_alt_url is defined and lang_alt_url %}
<a class="lang-switcher" href="{{ lang_alt_url }}" title="{{ lang_alt_label }}" lang="{{ lang_alt_code }}"
   aria-label="{{ lang_alt_label }}">
  {{ lang_alt_code | upper }}
</a>
{% endif %}
