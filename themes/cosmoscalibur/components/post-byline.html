{# Post byline — date + author, rendered below title via JS DOM move.
   Hidden initially (CSS visibility:hidden), JS moves it after <h1> and reveals it. #}
{% if cosmoblog_post %}
{% set post = cosmoblog_post %}
<div class="post-byline" aria-label="{{ _('Post information') }}">
  {% if post.date %}
  <span class="post-byline__item">
    📅 {{ post.date.strftime(cosmoblog.date_format) }}
  </span>
  {% endif %}
</div>
{% endif %}
