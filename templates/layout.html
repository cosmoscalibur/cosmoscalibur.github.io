{% extends "!layout.html" %}

{{ super() }}

{% block extrahead %}

<!-- Preconnect: reduce latency for external resources (production only) -->
<link rel="preconnect" href="https://pagead2.googlesyndication.com" crossorigin>
<link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
<link rel="dns-prefetch" href="https://googleads.g.doubleclick.net">
<link rel="dns-prefetch" href="https://fundingchoicesmessages.google.com">

<!-- Usado para mostrar publicidad -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-0356238418278924"
crossorigin="anonymous"></script>

{% if lang_alt_abs_url is defined and lang_alt_abs_url %}
<link rel="alternate" hreflang="{{ lang_alt_code }}" href="{{ lang_alt_abs_url }}" />
<link rel="alternate" hreflang="{{ lang_current_code }}" href="{{ lang_current_abs_url }}" />
{% endif %}

{% endblock %}
